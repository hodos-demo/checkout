name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (a real, small package — this repo's own manifest is intentionally fictitious, see fixture.ts)
        run: npm install --no-save --ignore-scripts is-odd
      - name: Run a trivial test
        run: node -e "console.log('hodos e2e trivial test: ok'); process.exit(0)"
